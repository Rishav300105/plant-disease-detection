<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PlantGuard Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #dfeee6, #9bc9a8);
}

/* 🔥 BIGGER CARD */
.card{
    width:420px;              /* increased */
    padding:50px 40px;        /* more spacing */

    background:#f8f8f8;
    border-radius:20px;

    box-shadow: 0 15px 35px rgba(0,0,0,0.12);

    text-align:center;
}

/* Logo */
.logo{
    font-size:24px;
    font-weight:bold;
    color:#2f7d32;
    margin-bottom:10px;
}

/* Heading */
h2{
    color:#2f7d32;
    margin-bottom:25px;
    font-size:26px;
}

/* Inputs */
.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:14px;           /* bigger input */

    border:1px solid #ddd;
    border-radius:12px;

    font-size:14px;

    outline:none;
    transition:0.2s;
}

.input-group input:focus{
    border-color:#2f7d32;
}

/* Password */
.password-wrapper{
    position:relative;
}

.eye{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

/* Button */
button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:12px;

    background:#2f7d32;
    color:white;

    font-size:15px;
    font-weight:bold;

    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#256728;
    transform:scale(1.02);
}

/* Bottom */
.bottom{
    margin-top:18px;
    font-size:15px;
}

.bottom a{
    color:#2f7d32;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

    <div class="logo">🌿 PlantGuard</div>
    <h2>Login</h2>

    <form method="POST">

        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-group password-wrapper">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="bottom">
        Don't have an account? <a href="/signup">Signup</a>
    </div>

</div>

<script>
function togglePassword(){
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
