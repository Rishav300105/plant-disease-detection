<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f7f4;
            padding: 40px;
        }

        h2 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .label {
            font-weight: bold;
            margin-top: 10px;
        }

        .confidence {
            color: green;
        }

        a {
            display: block;
            margin-top: 20px;
            text-align: center;
        }
        .btn-download {
  display: inline-block;
  padding: 10px 16px;
  background: #2d6a35;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  margin-bottom: 20px;
  transition: 0.3s;
}

.btn-download:hover {
  background: #1b4332;
  transform: scale(1.05);
}
    </style>
</head>
<body>

<h2>📊 Prediction History</h2>
<a href="/download_pdf" class="btn-download">📄 Download PDF</a>

<div class="grid">
    {% for item in history %}
    <div class="card">
        <img src="{{ url_for('static', filename='uploads/' + item.image) }}">
        <div class="label">{{ item.label }}</div>
        <div class="confidence">{{ item.confidence }}%</div>
    </div>
    {% endfor %}
</div>

<a href="/">⬅ Back to Home</a>

</body>
</html>
