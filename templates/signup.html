<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup - PlantGuard</title>

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #e8f5e9, #f1f8f4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 40px;
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #2d6a35;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #2d6a35;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2d6a35;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      background: #1b4332;
    }

    a {
      display: block;
      margin-top: 15px;
      color: #2d6a35;
      text-decoration: none;
      font-size: 14px;
    }

    a:hover {
      text-decoration: underline;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #2d6a35;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">🌿 PlantGuard</div>
    <h2>Signup</h2>

    <form method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">Signup</button>
    </form>

    <a href="/login">Already have an account? Login</a>
  </div>

</body>
</html>
